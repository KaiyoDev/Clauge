name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
          - platform: 'windows-11-arm'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            patchelf \
            pkg-config \
            rpm \
            xdg-utils

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH > /dev/null 2>&1
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH > /dev/null 2>&1
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "Certificate imported successfully"

      - name: Build, sign and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'A new version is available with improvements and bug fixes. Restart to apply the update.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Disable per-job latest.json upload. Each job would otherwise race to
          # merge-and-overwrite the shared file, dropping whichever platform
          # finished second. The generate-updater-json job below is the single
          # owner of latest.json and runs after all builds are done.
          uploadUpdaterJson: false

  # Single job that runs after ALL matrix builds complete. Because individual
  # jobs set uploadUpdaterJson: false, no latest.json exists yet — this job is
  # the sole generator, so there is no race condition.
  generate-updater-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json from all uploaded .sig files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, urllib.request, urllib.error, datetime

          TOKEN = os.environ['GITHUB_TOKEN']
          TAG   = os.environ['TAG']
          REPO  = 'ansxuman/Clauge'
          BASE  = f'https://github.com/{REPO}/releases/download/{TAG}'

          HEADERS = {
              'Authorization': f'token {TOKEN}',
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'clauge-ci',
          }

          def api(url):
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def fetch_text(browser_url):
              req = urllib.request.Request(browser_url, headers={'User-Agent': 'clauge-ci'})
              with urllib.request.urlopen(req) as r:
                  return r.read().decode().strip()

          # Maps: regex matching the artifact filename (without .sig)
          #       -> list of (platform_key, url_filename_override_or_None)
          # None means use the matched artifact filename as-is in the URL.
          RULES = [
              (r'^Clauge_aarch64\.app\.tar\.gz$', [
                  ('darwin-aarch64',     'Clauge_aarch64.app.tar.gz'),
                  ('darwin-aarch64-app', 'Clauge_aarch64.app.tar.gz'),
              ]),
              (r'^Clauge_x64\.app\.tar\.gz$', [
                  ('darwin-x86_64',     'Clauge_x64.app.tar.gz'),
                  ('darwin-x86_64-app', 'Clauge_x64.app.tar.gz'),
              ]),
              (r'^Clauge_.*_x64-setup\.exe$', [
                  ('windows-x86_64',      None),
                  ('windows-x86_64-nsis', None),
              ]),
              (r'^Clauge_.*_arm64-setup\.exe$', [
                  ('windows-aarch64',      None),
                  ('windows-aarch64-nsis', None),
              ]),
              (r'^Clauge_.*_amd64\.AppImage$', [
                  ('linux-x86_64',          None),
                  ('linux-x86_64-appimage', None),
              ]),
              (r'^Clauge_.*_aarch64\.AppImage$', [
                  ('linux-aarch64',          None),
                  ('linux-aarch64-appimage', None),
              ]),
              (r'^Clauge_.*_amd64\.deb$',      [('linux-x86_64-deb',  None)]),
              (r'^Clauge_.*_arm64\.deb$',      [('linux-aarch64-deb', None)]),
              (r'^Clauge-.*\.x86_64\.rpm$',    [('linux-x86_64-rpm',  None)]),
              (r'^Clauge-.*\.aarch64\.rpm$',   [('linux-aarch64-rpm', None)]),
          ]

          release  = api(f'https://api.github.com/repos/{REPO}/releases/tags/{TAG}')
          rel_id   = release['id']
          assets   = {a['name']: a for a in release['assets']}
          version  = TAG.lstrip('v')

          platforms = {}
          for pattern, entries in RULES:
              artifact = next((n for n in assets if re.match(pattern, n)), None)
              if not artifact:
                  print(f'SKIP no asset matching {pattern}')
                  continue
              sig_name = artifact + '.sig'
              if sig_name not in assets:
                  print(f'SKIP {sig_name} not uploaded yet')
                  continue
              sig = fetch_text(assets[sig_name]['browser_download_url'])
              for key, url_file in entries:
                  platforms[key] = {'signature': sig, 'url': f'{BASE}/{url_file or artifact}'}
                  print(f'  + {key}')

          pub_date = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.000Z')

          body = json.dumps({
              'version':  version,
              'notes':    'A new version is available with improvements and bug fixes. Restart to apply the update.',
              'pub_date': pub_date,
              'platforms': platforms,
          }, indent=2).encode()

          print(f'\nPlatforms in generated latest.json: {sorted(platforms)}')

          up_req = urllib.request.Request(
              f'https://uploads.github.com/repos/{REPO}/releases/{rel_id}/assets?name=latest.json',
              data=body, headers={**HEADERS, 'Content-Type': 'application/json'}, method='POST')
          with urllib.request.urlopen(up_req) as r:
              print(f'Uploaded authoritative latest.json (HTTP {r.status})')
          PYEOF
