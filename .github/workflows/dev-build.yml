name: Dev Build

# Build dev nhanh cho test nội bộ — CHỈ Windows x64. Không tạo Release
# public, chỉ upload Artifact để tải về test.
#
# Trigger:
#   • Push tag v*-vi*-dev* (vd. v3.0.3-vi-local-dev)
#   • Push lên branch clauge-viet-local
#   • Workflow dispatch (chạy tay từ tab Actions)

on:
  push:
    tags:
      - 'v*-vi*-dev*'
    branches:
      - 'clauge-viet-local'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'dev-windows-x64'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri (debug)
        # Chạy trực tiếp `bun tauri build --debug` thay vì tauri-action
        # để tránh bug top-level await crash exit 13. Build debug nhanh hơn
        # release ~30% và đủ cho test chức năng.
        run: bun tauri build --debug

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clauge-viet-windows-x64-debug
          path: |
            src-tauri/target/debug/bundle/msi/*.msi
            src-tauri/target/debug/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14
