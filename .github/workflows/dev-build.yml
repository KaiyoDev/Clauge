name: Dev Build

# Build dev cho test nội bộ — CHỈ Windows x64. Build RELEASE (không có
# cmd debug đen, file gọn ~25MB, app mượt) nhưng upload thành Artifact
# thay vì tạo Release public. Khi muốn release chính thức cho người dùng
# cuối, dùng workflow `release-vn.yml` (push tag v*-vi*).
#
# Trigger:
#   • Push tag v*-vi*-dev* (vd. v3.0.3-vi-local-dev)
#   • Push lên branch clauge-viet-local
#   • Workflow dispatch (chạy tay từ tab Actions)

on:
  push:
    tags:
      - 'v*-vi*-dev*'
    branches:
      - 'clauge-viet-local'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'dev-windows-x64'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri (release)
        # Release build — không có cmd console đen, file ~25MB, app mượt.
        # Đủ cho test trải nghiệm.
        run: bun tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clauge-viet-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14
