name: Release VN

# Build và publish release cho fork Việt hóa — CHỈ Windows x64.
# Không yêu cầu Apple cert hay Tauri signing key.

on:
  push:
    tags:
      - 'v*-vi*'
      - '!v*-vi*-dev*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag để build (vd. v3.0.3-vi.1)'
        required: true
        default: 'v3.0.3-vi.1'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'release-windows-x64'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri (release)
        run: bun tauri build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: 'Clauge Việt ${{ github.event.inputs.tag || github.ref_name }}'
          body: |
            ## Clauge Việt — Bản Local thuần

            Công cụ lập trình của người Việt — Local-first • Privacy-first • Miễn phí mãi mãi.

            **Tải bản Windows ở phần Assets bên dưới:**
            - `.msi` — installer chuẩn (khuyến nghị triển khai admin)
            - `.exe` (NSIS) — installer gọn nhẹ (khuyến nghị cá nhân)

            ⚠️ **Bản này không ký số (unsigned)** — Windows SmartScreen có thể cảnh báo.
            Cách bỏ qua: nhấn **"More info" → "Run anyway"**.

            ## Triết lý

            - Toàn bộ dữ liệu mặc định lưu trên máy bạn (local-first)
            - Không thu thập dữ liệu cá nhân, không telemetry
            - Không Pro, không upsell, không quảng cáo
            - Không có đăng nhập đám mây — không phụ thuộc server bên ngoài

            ## Build từ source

            Xem [README.md](https://github.com/${{ github.repository }}/blob/main/README.md).
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
